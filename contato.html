  function initLenisGlobal() {

    }

    // Configuração Premium de inércia
    const lenis = new Lenis({
      duration: 1.2, 
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
      smoothWheel: true,
      smoothTouch: false, // Mantém o touch natural do celular
    });

    window.myGlobalLenis = lenis;

    // Loop de renderização NATIVO DO NAVEGADOR (Não depende do GSAP)
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);

    // Tenta conectar o Lenis ao ScrollTrigger (se ele existir na página)
    // O setInterval garante a conexão mesmo se o script do GSAP carregar um pouco depois
    let tries = 0;

      if (typeof ScrollTrigger !== 'undefined') {
        lenis.on('scroll', ScrollTrigger.update);
        clearInterval(connectGsap);
      }
      // Desiste de procurar após 2 segundos (ex: numa página "Contato" que não tem GSAP)
      tries++;
      if (tries > 20) clearInterval(connectGsap);

  }

  // Inicia com um pequeno atraso de 300ms para garantir que o Ycode desenhou o Body
  setTimeout(initLenisGlobal, 300);

  // Vigia de SPA: Reinicia o Lenis sempre que a URL mudar
  let lastUrl = location.href;
  new MutationObserver(() => {
    if (location.href !== lastUrl) {
      lastUrl = location.href;
      setTimeout(initLenisGlobal, 300);
    }
  }).observe(document.body, { childList: true, subtree: true });

})();
</script>

<script>
(function() {
  function initMobileMenu() {
    const siteNavbar = document.getElementById('site-navbar');
    const menuBtn = document.getElementById('menu-btn');
    const menuLinks = document.getElementById('menu-links');
    const menuCta = document.getElementById('menu-cta');
    
    if (!menuBtn || !menuLinks || !siteNavbar || menuBtn.dataset.menuInit === "true") return;

    let menuOpen = false;
    const isMobile = window.matchMedia("(max-width: 1023px)");

    function handleResize(e) {
      if (e.matches) {
        siteNavbar.style.overflow = 'visible';
        
        // Removidos os filtros de blur do clearProps
        gsap.set([menuLinks, menuCta], { 
          opacity: 0, 
          y: -10, 
          display: 'none', 
          clearProps: "position,top,left,right,width,backgroundColor,padding,flexDirection,alignItems,gap" 
        });
        
        const links = menuLinks.querySelectorAll('a');
        gsap.set(links, { clearProps: "margin,padding,fontSize" });
        
        menuOpen = false;
      } else {
        siteNavbar.style.overflow = ''; 
        gsap.set([menuLinks, menuCta], { clearProps: "all" });
        const links = menuLinks.querySelectorAll('a');
        gsap.set(links, { clearProps: "all" });
        menuOpen = false;
      }
    }

    handleResize(isMobile);
    isMobile.addListener(handleResize);

    menuBtn.style.cursor = 'pointer';
    
    menuBtn.addEventListener('click', (event) => {
      if (!isMobile.matches) return;
      event.stopPropagation(); 

      const navHeight = siteNavbar.offsetHeight;

      if (menuOpen) {
        // Fechar Menu
        gsap.to([menuLinks, menuCta], {
          y: -10,
          opacity: 0,
          duration: 0.3,
          ease: "power2.in",
          onComplete: () => gsap.set([menuLinks, menuCta], { display: 'none' })
        });
      } else {
        // Abrir Menu
        gsap.set(menuLinks, { 
          display: 'flex', 
          flexDirection: 'column', 
          alignItems: 'flex-start',
          gap: '4px', 
          position: 'absolute', 
          top: `${navHeight}px`, 
          left: '16px',  
          right: '16px', 
          width: 'auto', 
          // Fundo chapado em 95% (cinza 900 quase sem transparência)
          backgroundColor: 'rgba(23, 23, 23, 0.95)',
          padding: '24px 24px 80px 24px', 
          borderRadius: '16px',
          zIndex: 90
        });

        const links = menuLinks.querySelectorAll('a');
        gsap.set(links, { 
            margin: '0', 
            paddingTop: '6px', 
            paddingBottom: '6px', 
            fontSize: '14px' 
        });

        const menuHeight = menuLinks.offsetHeight; 
        
        gsap.set(menuCta, { 
          display: 'flex',
          position: 'absolute',
          top: `${navHeight + menuHeight - 64}px`, 
          left: '40px', 
          xPercent: 0, 
          zIndex: 91
        });

        gsap.to([menuLinks, menuCta], {
          y: 0,
          opacity: 1,
          duration: 0.4,
          ease: "power3.out",
          stagger: 0.05
        });
      }
      menuOpen = !menuOpen;
    });

    document.addEventListener('click', (event) => {
      if (menuOpen && isMobile.matches && !menuLinks.contains(event.target) && !menuCta.contains(event.target) && !menuBtn.contains(event.target)) {
        gsap.to([menuLinks, menuCta], {
          y: -10,
          opacity: 0,
          duration: 0.3,
          ease: "power2.in",
          onComplete: () => gsap.set([menuLinks, menuCta], { display: 'none' })
        });
        menuOpen = false;
      }
    });

    menuBtn.dataset.menuInit = "true";
  }

  initMobileMenu();

  const observer = new MutationObserver(() => {
    const btn = document.getElementById('menu-btn');
    if (btn && btn.dataset.menuInit !== "true") {
      initMobileMenu();
    }
  });
  
  observer.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>
  
</body>
</html>
